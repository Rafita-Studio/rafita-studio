backend:
  name: github
  repo: rafita-studio/website
  branch: main

media_folder: "assets/uploads"
public_folder: "assets/uploads"

collections:
  - name: "projects"
    label: "Proyectos"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Cliente", name: "client", widget: "string", required: false }
      - { label: "Ano", name: "year", widget: "number", value_type: "int", min: 2000, max: 2100 }
      - { label: "Categoria", name: "category", widget: "string", required: false }
      - { label: "Imagen", name: "image", widget: "image", required: false }
      - { label: "Publicado", name: "published", widget: "boolean", default: true }
      - { label: "Descripcion", name: "body", widget: "markdown", required: false }
