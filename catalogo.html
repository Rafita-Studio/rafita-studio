<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catálogo — Rafita Studio</title>
    <link rel="stylesheet" href="https://use.typekit.net/iic6jga.css" />
    <link rel="stylesheet" href="style.css" />

    <style>
      /* === CATÁLOGO === */
      .catalogo {
        column-count: 4;
        column-gap: 1rem;
        padding: 2rem;
        max-width: 1400px;
        margin: 0 auto;
      }

      .catalogo img {
        width: 100%;
        height: auto;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 1rem;
        break-inside: avoid;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        transition: transform 0.25s ease, filter 0.25s ease;
      }

      .catalogo img:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      @media (max-width: 900px) {
        .catalogo {
          column-count: 3;
        }
      }

      @media (max-width: 600px) {
        .catalogo {
          column-count: 2;
          padding: 1rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- ===== HEADER ===== -->
    <header>
      <a href="index.html" class="logo">
        <img
          src="assets/rafitaStudio_logo2025.png"
          alt="Rafita Studio Logo"
        />
      </a>

      <nav>
        <ul class="desktop-nav">
          <li><a href="index.html#work">Work</a></li>
          <li><a href="catalogo.html" class="active">Catálogo</a></li>
          <li>
            <a
              href="https://piruetasxyz.myshopify.com/collections/rafita-studio"
              target="_blank"
              >Shop</a
            >
          </li>
          <li><a href="about.html">About Us</a></li>
          <li>
            <a
              href="https://instagram.com/rafita.studio"
              target="_blank"
              class="instagram-link"
              >@rafita.studio</a
            >
          </li>
        </ul>
      </nav>

      <!-- botón hamburguesa -->
      <button
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="mobile-drawer"
        aria-label="Abrir menú"
      >
        <span class="bar" aria-hidden="true"></span>
      </button>
    </header>

    <!-- ===== DRAWER MÓVIL (fuera del header) ===== -->
    <div id="mobile-drawer" class="mobile-drawer" aria-hidden="true">
      <div class="drawer-backdrop" data-close></div>
      <aside
        class="drawer-panel"
        role="dialog"
        aria-modal="true"
        aria-label="Menú"
      >
        <a href="catalogo.html" class="back-home" aria-label="Volver a inicio"
          >← Volver</a
        >

        <nav aria-label="Mobile">
          <ul class="mobile-nav">
            <li><a href="index.html#work">Work</a></li>
            <li><a href="catalogo.html" class="active">Catálogo</a></li>
            <li>
              <a
                href="https://piruetasxyz.myshopify.com/collections/rafita-studio"
                target="_blank"
                >Shop</a
              >
            </li>
            <li><a href="about.html">About Us</a></li>
            <li>
              <a
                href="https://instagram.com/rafita.studio"
                target="_blank"
                class="instagram-link"
                >@rafita.studio</a
              >
            </li>
          </ul>
        </nav>
      </aside>
    </div>

    <!-- ===== MAIN ===== -->
    <main>
      <section class="catalogo">
        <img src="assets/catalogo/01.png" alt="Catálogo 01" loading="lazy" />
        <img src="assets/catalogo/02.jpg" alt="Catálogo 02" loading="lazy" />
        <img src="assets/catalogo/03.jpg" alt="Catálogo 03" loading="lazy" />
        <img src="assets/catalogo/04.jpg" alt="Catálogo 04" loading="lazy" />
        <img src="assets/catalogo/05.jpg" alt="Catálogo 05" loading="lazy" />
        <img src="assets/catalogo/06.png" alt="Catálogo 06" loading="lazy" />
        <img src="assets/catalogo/07.png" alt="Catálogo 07" loading="lazy" />
        <img src="assets/catalogo/08.jpg" alt="Catálogo 08" loading="lazy" />
        <img src="assets/catalogo/09.jpg" alt="Catálogo 09" loading="lazy" />
        <img src="assets/catalogo/12.png" alt="Catálogo 12" loading="lazy" />
        <img src="assets/catalogo/13.png" alt="Catálogo 13" loading="lazy" />
        <img src="assets/catalogo/14.png" alt="Catálogo 14" loading="lazy" />
        <img src="assets/catalogo/15.jpg" alt="Catálogo 15" loading="lazy" />
        <img src="assets/catalogo/16.jpg" alt="Catálogo 16" loading="lazy" />
        <img src="assets/catalogo/17.jpg" alt="Catálogo 17" loading="lazy" />
        <img src="assets/catalogo/18.jpg" alt="Catálogo 18" loading="lazy" />
      </section>
    </main>

    <footer>
      <p>© 2025 Rafita Studio. Todos los derechos reservados.</p>
    </footer>

    <!-- ===== JS DEL MENÚ HAMBURGUESA ===== -->
    <script>
      const navToggle = document.querySelector(".nav-toggle");
      const mobileDrawer = document.getElementById("mobile-drawer");
      const backdrop = document.querySelector(".drawer-backdrop");

      navToggle.addEventListener("click", () => {
        const isOpen = mobileDrawer.classList.contains("is-open");
        if (isOpen) {
          mobileDrawer.classList.add("is-closing");
          setTimeout(() => {
            mobileDrawer.classList.remove("is-open", "is-closing");
          }, 300);
          navToggle.setAttribute("aria-expanded", "false");
          document.body.classList.remove("menu-open");
        } else {
          mobileDrawer.classList.add("is-open");
          navToggle.setAttribute("aria-expanded", "true");
          document.body.classList.add("menu-open");
        }
      });

      backdrop.addEventListener("click", () => {
        mobileDrawer.classList.add("is-closing");
        setTimeout(() => {
          mobileDrawer.classList.remove("is-open", "is-closing");
        }, 300);
        navToggle.setAttribute("aria-expanded", "false");
        document.body.classList.remove("menu-open");
      });

      // === Protección de imágenes ===
      document.addEventListener("contextmenu", (e) => {
        if (e.target.tagName === "IMG") {
          e.preventDefault();
        }
      });

      document.addEventListener("dragstart", (e) => {
        if (e.target.tagName === "IMG") {
          e.preventDefault();
        }
      });
    </script>

    <!-- CSS adicional opcional (en caso de no tenerlo en style.css) -->
    <style>
      img {
        -webkit-user-drag: none;
        -webkit-user-select: none;
        user-select: none;
        pointer-events: auto;
      }
    </style>
  </body>
</html>
