<!DOCTYPE html>
<html lang="es">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catálogo — Rafita Studio</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      /* === CATÁLOGO === */
      .catalogo {
        column-count: 4;
        column-gap: 1rem;
        padding: 2rem;
        max-width: 1400px;
        margin: 0 auto;
      }

      .catalogo img {
        width: 100%;
        height: auto;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 1rem;
        break-inside: avoid;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        transition: transform 0.25s ease, filter 0.25s ease;
      }

      .catalogo img:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      @media (max-width: 900px) {
        .catalogo {
          column-count: 3;
        }
      }

      @media (max-width: 600px) {
        .catalogo {
          column-count: 2;
          padding: 1rem;
        }
      }
    </style>
  </head>

  <body>

          <li>

              href="https://piruetasxyz.myshopify.com/collections/rafita-studio"

            <a
              href="https://instagram.com/rafita.studio"
              target="_blank"
              class="instagram-link"
              >@rafita.studio</a

          </li>
        </ul>
      </nav>

      <!-- botón hamburguesa -->
      <button
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="mobile-drawer"
        aria-label="Abrir menú"
      >
        <span class="bar" aria-hidden="true"></span>
      </button>

      <!-- drawer móvil -->

          role="dialog"
          aria-modal="true"

        >
          <!-- flecha volver -->
          <a href="index.html" class="back-home" aria-label="Volver a inicio"

          >

          <nav aria-label="Mobile">
            <ul class="mobile-nav">
              <li><a href="index.html#work">Work</a></li>
              <li><a href="catalogo.html" class="active">Catálogo</a></li>
              <li>
                <a
                  href="https://piruetasxyz.myshopify.com/collections/rafita-studio"
                  target="_blank"
                  >Shop</a
                >
              </li>
              <li><a href="about.html">About Us</a></li>
              <li>
                <a
                  href="https://instagram.com/rafita.studio"
                  target="_blank"

                  >@rafita.studio</a

              </li>

          </nav>
        </aside>
      </div>
    </header>

    <!-- JS del menú hamburguesa -->
    <script>
      const navToggle = document.querySelector(".nav-toggle");
      const mobileDrawer = document.getElementById("mobile-drawer");
      const backdrop = document.querySelector(".drawer-backdrop");

      navToggle.addEventListener("click", () => {
        const isOpen = mobileDrawer.classList.contains("is-open");
        if (isOpen) {
          mobileDrawer.classList.add("is-closing");
          setTimeout(() => {
            mobileDrawer.classList.remove("is-open", "is-closing");
          }, 300);
          navToggle.setAttribute("aria-expanded", "false");
        } else {
          mobileDrawer.classList.add("is-open");
          navToggle.setAttribute("aria-expanded", "true");
        }
      });

      backdrop.addEventListener("click", () => {
        mobileDrawer.classList.add("is-closing");
        setTimeout(() => {
          mobileDrawer.classList.remove("is-open", "is-closing");
        }, 300);
        navToggle.setAttribute("aria-expanded", "false");
      });
    </script>
