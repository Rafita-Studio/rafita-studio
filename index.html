<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rafita Studio</title>
    <link rel="stylesheet" href="https://use.typekit.net/iic6jga.css" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        overflow-y: auto;
        background: #f5f5f5;
        font-family: "liebling", sans-serif;
      }

      /* ══════════════════════════════════════════
         HERO
         ══════════════════════════════════════════ */

      #hero {
        position: relative;
        width: 100%;
        height: 100vh;
        background: #ecebe6;
        overflow: hidden;
        display: grid;
        place-items: center;
        padding: clamp(24px, 5vw, 80px);
      }

      #sticker-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.78;
        pointer-events: none;
        transition: opacity 520ms ease;
      }

      .hero-logo {
        --hero-logo-y: 0px;
        --hero-logo-x: -1.5vw;
        font-family: "liebling", sans-serif;
        font-weight: 700;
        font-size: clamp(92px, 18vw, 310px);
        line-height: 0.78;
        color: #363636;
        text-align: center;
        letter-spacing: 0;
        text-transform: uppercase;
        width: min-content;
        max-width: 100%;
        transform: translate(var(--hero-logo-x), var(--hero-logo-y));
        transition: transform 520ms cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        z-index: 2;
      }

      .hero-logo-line {
        display: block;
        white-space: nowrap;
      }

      .hero-logo-reg {
        display: inline-block;
        font-size: 0.42em;
        line-height: 0;
        transform: translateY(-0.72em);
      }

      .hero-info {
        position: absolute;
        top: clamp(18px, 3vw, 42px);
        right: clamp(18px, 3vw, 42px);
        z-index: 6;
      }

      .hero-info-star {
        appearance: none;
        border: 2px solid #363636;
        border-radius: 999px;
        background: #ecebe6;
        color: #363636;
        font-family: "liebling", sans-serif;
        font-weight: 700;
        font-size: clamp(17px, 1.8vw, 26px);
        line-height: 1;
        padding: 10px 16px 12px;
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(45, 38, 42, 0.08);
        transition:
          background 220ms ease,
          border-color 220ms ease,
          color 220ms ease,
          transform 220ms ease;
      }

      .hero-info:hover .hero-info-star,
      .hero-info.bio-open .hero-info-star {
        background: #ffffff;
        border-color: #ff9418;
        color: #ff9418;
        transform: rotate(-2deg) scale(1.04);
      }

      .hero-info.bio-open ~ .hero-logo {
        transform: translate(var(--hero-logo-x), calc(var(--hero-logo-y) + clamp(70px, 12vh, 130px))) rotate(-2deg);
      }

      .hero-bio-blob {
        position: absolute;
        top: calc(100% + 14px);
        right: 0;
        width: min(620px, calc(100vw - 36px));
        padding: 42px 52px 48px 66px;
        background: transparent;
        color: #2f2f2f;
        font-family: "liebling", sans-serif;
        font-weight: 500;
        font-size: clamp(17px, 2vw, 28px);
        line-height: 1.02;
        opacity: 0;
        transform: translateY(-8px) rotate(-4deg) scale(0.92);
        transform-origin: 90% 0;
        pointer-events: none;
        transition:
          opacity 240ms ease,
          transform 420ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .hero-bio-blob::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        border-radius: 22px;
        background: #ffbcf2;
        clip-path: polygon(4% 15%, 18% 7%, 52% 4%, 82% 8%, 98% 19%, 95% 47%, 99% 72%, 82% 91%, 52% 96%, 16% 90%, 3% 70%, 6% 38%);
        filter: drop-shadow(0 22px 28px rgba(45, 38, 42, 0.16));
      }

      .hero-info.bio-open .hero-bio-blob {
        opacity: 1;
        transform: translateY(0) rotate(-4deg) scale(1);
        pointer-events: auto;
      }

      .hero-bio-blob a {
        color: inherit;
        font-weight: 700;
        text-decoration: underline;
      }

      .hover-letter {
        display: inline-block;
        transition: color 160ms ease, transform 160ms ease;
      }

      .hero-logo .hover-letter {
        margin: -0.04em -0.025em;
        padding: 0.04em 0.025em;
      }

      .hover-letter:hover {
        color: var(--hover-color, #ff9418);
        transform: translateY(-0.04em) rotate(-3deg);
      }

      @media (max-width: 720px) {
        #hero {
          height: 58svh;
          min-height: 430px;
          padding: 18px;
          place-items: center;
        }

        .hero-logo {
          --hero-logo-y: 0;
          --hero-logo-x: -2vw;
          font-size: clamp(76px, 24vw, 150px);
        }

        .hero-info {
          top: 16px;
          right: 18px;
        }

        .hero-bio-blob {
          width: min(420px, calc(100vw - 28px));
          padding: 34px 34px 38px 46px;
          font-size: clamp(17px, 5vw, 24px);
          line-height: 1.02;
        }

        .hero-info.bio-open ~ .hero-logo {
          transform: translate(var(--hero-logo-x), calc(var(--hero-logo-y) + 92px)) rotate(-2deg);
        }
      }

      /* ══════════════════════════════════════════
         CATALOG
         ══════════════════════════════════════════ */

      #catalog-scroll {
        position: relative;
        height: 118vh;
        background: #ecebe6;
        overflow: clip;
      }

      .catalog-stage {
        position: sticky;
        top: 0;
        height: 82vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .catalog-stack {
        position: relative;
        width: min(1440px, 112vw);
        height: min(54vh, 580px);
      }

      .catalog-card {
        position: absolute;
        top: 50%;
        left: var(--x);
        width: clamp(160px, 20vw, 330px);
        aspect-ratio: 0.707 / 1;
        opacity: 0;
        transform: translate(-50%, calc(-50% + 88px)) rotate(var(--from-rotate)) scale(0.92);
        transition:
          opacity 620ms ease,
          transform 860ms cubic-bezier(0.16, 1, 0.3, 1),
          filter 860ms ease;
        z-index: var(--z);
        filter: drop-shadow(0 22px 26px rgba(25, 22, 20, 0.16));
        will-change: transform, opacity;
      }

      .catalog-card.visible {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--rotate)) scale(1);
      }

      .catalog-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #ffffff;
      }

      @media (max-width: 720px) {
        #catalog-scroll { height: 112vh; }
        .catalog-stage {
          height: 70vh;
          align-items: flex-start;
        }
        .catalog-stack {
          width: 112vw;
          height: 62vh;
          margin-top: 2vh;
        }
        .catalog-card {
          top: var(--mobile-y);
          left: var(--mobile-x);
          width: clamp(172px, 52vw, 250px);
        }

        .catalog-card:nth-child(1) { --mobile-x: 18%; --mobile-y: 34%; }
        .catalog-card:nth-child(2) { --mobile-x: 42%; --mobile-y: 32%; }
        .catalog-card:nth-child(3) { --mobile-x: 66%; --mobile-y: 35%; }
        .catalog-card:nth-child(4) { --mobile-x: 90%; --mobile-y: 33%; }
        .catalog-card:nth-child(5) { --mobile-x: 16%; --mobile-y: 66%; }
        .catalog-card:nth-child(6) { --mobile-x: 40%; --mobile-y: 68%; }
        .catalog-card:nth-child(7) { --mobile-x: 65%; --mobile-y: 65%; }
        .catalog-card:nth-child(8) { --mobile-x: 89%; --mobile-y: 67%; }
      }

      /* ══════════════════════════════════════════
         TYPE POSTER
         ══════════════════════════════════════════ */

      #type-poster {
        min-height: 68vh;
        background: #ecebe6;
        color: #363636;
        display: flex;
        align-items: flex-start;
        overflow: hidden;
        padding: clamp(4px, 1.2vw, 18px) clamp(24px, 5vw, 82px) clamp(48px, 6vw, 92px);
      }

      .type-poster-inner {
        width: 100%;
        max-width: 1480px;
        margin: 0 auto;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 400;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .type-line {
        display: block;
        width: fit-content;
        max-width: 100%;
        font-size: clamp(46px, 7vw, 126px);
        line-height: 0.98;
        white-space: nowrap;
        opacity: 0;
        transform: translateY(24px);
        transition:
          color 260ms ease,
          opacity 420ms ease,
          transform 620ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      #type-poster.poster-visible .type-line {
        opacity: 1;
        transform: translateY(0);
      }

      .type-line:nth-child(1) { margin-left: 0; transition-delay: 0ms; }
      .type-line:nth-child(2) { margin-left: min(18vw, 260px); transition-delay: 120ms; }
      .type-line:nth-child(3) { margin-left: auto; transition-delay: 240ms; }
      .type-line:nth-child(4) { margin-left: min(24vw, 340px); transition-delay: 360ms; }

      .type-line:nth-child(1) { color: #ff9418; }
      .type-line:nth-child(2) { color: #0d73c8; }
      .type-line:nth-child(3) { color: #099947; }
      .type-line:nth-child(4) { color: #f193c9; }

      #type-poster:hover .type-line { transition-delay: 0ms; }

      .type-glyph {
        display: inline-block;
        font-weight: 500;
        transform: translateY(0.02em);
      }

      @media (max-width: 720px) {
        #type-poster {
          min-height: 36vh;
          padding: 0 18px 12px;
        }

        .type-line {
          width: 100%;
          font-size: clamp(34px, 11vw, 62px);
          line-height: 1.02;
          text-align: center;
        }

        .type-line:nth-child(1) { margin-left: 0; }
        .type-line:nth-child(2) { margin-left: 0; }
        .type-line:nth-child(3) { margin-left: 0; }
        .type-line:nth-child(4) { margin-left: 0; }
      }

      /* ══════════════════════════════════════════
         FOOTER
         ══════════════════════════════════════════ */

      #site-footer {
        background: #f7f1f8;
        padding: 28px 24px;
        text-align: center;
        opacity: 0;
        transform: translateY(26px);
        transition: opacity 700ms ease, transform 700ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      #site-footer.footer-visible {
        opacity: 1;
        transform: translateY(0);
      }
      #site-footer p {
        margin: 0 auto;
        max-width: 720px;
        font-family: "liebling", sans-serif;
        font-size: 14px;
        color: #5d4c63;
      }
      #site-footer .copyright-mark {
        display: inline-block;
        margin: 0 5px;
        opacity: 0;
        transform: translateY(8px) rotate(-12deg) scale(0.4);
      }
      #site-footer.footer-visible .copyright-mark {
        animation: copyright-pop 700ms cubic-bezier(0.2, 1.35, 0.35, 1) 180ms forwards;
      }

      @keyframes copyright-pop {
        0% { opacity: 0; transform: translateY(8px) rotate(-12deg) scale(0.4); }
        70% { opacity: 1; transform: translateY(-2px) rotate(8deg) scale(1.16); }
        100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      }
    </style>
  </head>

    <!-- ══════════════════════════════════════════
         SCRIPTS
         ══════════════════════════════════════════ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <!-- Hero -->
    <script>
      (function () {
        document.addEventListener("DOMContentLoaded", function () {
          var lines = Array.prototype.slice.call(document.querySelectorAll("[data-hero-scramble]"));
          var logo = document.querySelector(".hero-logo");
          var heroInfo = document.querySelector(".hero-info");
          var heroInfoButton = document.querySelector(".hero-info-star");
          var glyphs = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789*+/#@!?%&<>☻✱";
          var palette = ["#ff9418","#66b6e9","#099947","#f193c9","#ff3122","#ffc21a","#0d73c8","#5833a3"];

          function pickColor() {
            return palette[Math.floor(Math.random() * palette.length)];
          }

          function randomizeText(text) {
            var output = "";
            for (var i = 0; i < text.length; i++) {
              output += text[i] === " " ? " " : glyphs[Math.floor(Math.random() * glyphs.length)];
            }
            return output;
          }

          function renderLogoText(line, text) {
            line.textContent = "";
            for (var i = 0; i < text.length; i++) {
              if (text[i] === "®") {
                var reg = document.createElement("span");
                reg.className = "hero-logo-reg hover-letter";
                reg.style.setProperty("--hover-color", pickColor());
                reg.textContent = "®";
                line.appendChild(reg);
              } else if (text[i] === " ") {
                line.appendChild(document.createTextNode(" "));
              } else {
                var letter = document.createElement("span");
                letter.className = "hover-letter";
                letter.style.setProperty("--hover-color", pickColor());
                letter.textContent = text[i];
                line.appendChild(letter);
              }
            }
          }

          function scrambleLine(line, delay) {
            var target = line.getAttribute("data-hero-scramble") || "";
            var frame = 0;
            var maxFrames = target.length + 30;

            setTimeout(function () {
              var timer = setInterval(function () {
                var output = "";
                for (var i = 0; i < target.length; i++) {
                  if (frame > i * 2 + 14) {
                    output += target[i];
                  } else {
                    output += glyphs[Math.floor(Math.random() * glyphs.length)];
                  }
                }
                renderLogoText(line, output);
                frame++;
                if (frame > maxFrames) {
                  renderLogoText(line, target);
                  clearInterval(timer);
                }
              }, 48);
            }, delay);
          }

          lines.forEach(function (line, index) {
            renderLogoText(line, randomizeText(line.getAttribute("data-hero-scramble") || ""));
            scrambleLine(line, index * 360);
          });

          if (logo) {
            logo.addEventListener("pointerover", function (event) {
              if (event.target.classList.contains("hover-letter")) {
                event.target.style.setProperty("--hover-color", pickColor());
              }
            });
          }

          if (heroInfo && heroInfoButton) {
            heroInfoButton.setAttribute("aria-expanded", "false");
            heroInfoButton.addEventListener("click", function () {
              var isOpen = heroInfo.classList.toggle("bio-open");
              heroInfoButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });
          }

          initStickerPhysics();

          function initStickerPhysics() {
            var hero = document.getElementById("hero");
            var canvas = document.getElementById("sticker-canvas");
            if (!hero || !canvas || !logo || !window.Matter) return;

            var Engine = Matter.Engine;
            var Runner = Matter.Runner;
            var Bodies = Matter.Bodies;
            var Body = Matter.Body;
            var Composite = Matter.Composite;
            var Events = Matter.Events;
            var engine = Engine.create({ gravity: { x: 0, y: 0, scale: 0.001 } });
            var runner = Runner.create();
            var ctx = canvas.getContext("2d");
            var stickers = [
              "assets/stickers/Recurso 21.png",
              "assets/stickers/Recurso 22.png",
              "assets/stickers/Recurso 23.png",
              "assets/stickers/Recurso 24.png",
              "assets/stickers/Recurso 25.png",
              "assets/stickers/Recurso 26.png"
            ];
            var images = [];
            var bodies = [];
            var walls = [];
            var logoBodies = [];
            var pointer = { x: -1000, y: -1000, active: false };
            var visible = false;

            function resizeCanvas() {
              var rect = hero.getBoundingClientRect();
              var dpr = window.devicePixelRatio || 1;
              canvas.width = Math.floor(rect.width * dpr);
              canvas.height = Math.floor(rect.height * dpr);
              canvas.style.width = rect.width + "px";
              canvas.style.height = rect.height + "px";
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              rebuildWalls(rect.width, rect.height);
              rebuildLogoBodies();
              placeBodies(rect.width, rect.height);
            }

            function rebuildWalls(width, height) {
              if (walls.length) Composite.remove(engine.world, walls);
              walls = [
                Bodies.rectangle(width / 2, -40, width, 80, { isStatic: true }),
                Bodies.rectangle(width / 2, height + 40, width, 80, { isStatic: true }),
                Bodies.rectangle(-40, height / 2, 80, height, { isStatic: true }),
                Bodies.rectangle(width + 40, height / 2, 80, height, { isStatic: true })
              ];
              Composite.add(engine.world, walls);
            }

            function rebuildLogoBodies() {
              var heroRect = hero.getBoundingClientRect();
              var logoLines = Array.prototype.slice.call(logo.querySelectorAll(".hero-logo-line"));
              if (logoBodies.length) Composite.remove(engine.world, logoBodies);
              logoBodies = logoLines.map(function (line) {
                var rect = line.getBoundingClientRect();
                var width = Math.max(rect.width * 0.94, 10);
                var height = Math.max(rect.height * 0.58, 10);
                var x = rect.left - heroRect.left + rect.width / 2;
                var y = rect.top - heroRect.top + rect.height / 2;
                return Bodies.rectangle(x, y, width, height, {
                  isStatic: true,
                  restitution: 0.58,
                  friction: 0.08,
                  render: { visible: false }
                });
              });
              if (logoBodies.length) Composite.add(engine.world, logoBodies);
            }

            function placeBodies(width, height) {
              bodies.forEach(function (body, index) {
                if (body.orbit) {
                  body.orbit.cx = width * body.orbit.nx;
                  body.orbit.cy = height * body.orbit.ny;
                  body.orbit.rx = width * body.orbit.nrx;
                  body.orbit.ry = height * body.orbit.nry;
                }
                if (body.position.x > width || body.position.y > height) {
                  Body.setPosition(body, {
                    x: width * body.orbit.nx,
                    y: height * body.orbit.ny
                  });
                }
              });
            }

            function createStickers() {
              var rect = hero.getBoundingClientRect();
              stickers.forEach(function (src, index) {
                var img = new Image();
                img.src = src;
                images[index] = img;

                var size = Math.min(Math.max(rect.width * 0.12, 92), 170);
                var nx = 0.12 + Math.random() * 0.76;
                var ny = 0.16 + Math.random() * 0.68;
                var tries = 0;
                while (nx > 0.18 && nx < 0.82 && ny > 0.34 && ny < 0.70 && tries < 16) {
                  nx = 0.12 + Math.random() * 0.76;
                  ny = 0.16 + Math.random() * 0.68;
                  tries++;
                }
                var nrx = 0.08 + Math.random() * 0.12;
                var nry = 0.07 + Math.random() * 0.11;
                var body = Bodies.circle(
                  rect.width * nx,
                  rect.height * ny,
                  size * 0.42,
                  {
                    restitution: 0.56,
                    friction: 0.08,
                    frictionAir: 0.028,
                    density: 0.0008,
                    render: { visible: false }
                  }
                );
                body.stickerIndex = index;
                body.stickerSize = size;
                body.lastHit = 0;
                body.orbit = {
                  nx: nx,
                  ny: ny,
                  nrx: nrx,
                  nry: nry,
                  cx: rect.width * nx,
                  cy: rect.height * ny,
                  rx: rect.width * nrx,
                  ry: rect.height * nry,
                  speed: 0.45 + Math.random() * 0.55,
                  phase: Math.random() * Math.PI * 2,
                  driftSpeed: 0.18 + Math.random() * 0.42,
                  driftPhase: Math.random() * Math.PI * 2,
                  driftX: (Math.random() - 0.5) * 0.18,
                  driftY: (Math.random() - 0.5) * 0.18,
                  force: 0.00012 + Math.random() * 0.00023
                };
                Body.setVelocity(body, {
                  x: (Math.random() - 0.5) * 5.2,
                  y: (Math.random() - 0.5) * 5.2
                });
                Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.06);
                bodies.push(body);
              });
              Composite.add(engine.world, bodies);
            }

            function gentlyFloat() {
              var time = Date.now() * 0.001;
              engine.gravity.x = Math.sin(time * 0.37) * 0.055;
              engine.gravity.y = Math.cos(time * 0.31) * 0.055;

              bodies.forEach(function (body, index) {
                var orbit = body.orbit;
                var logoRect = logo.getBoundingClientRect();
                var heroRect = hero.getBoundingClientRect();
                var logoCenterX = logoRect.left - heroRect.left + logoRect.width / 2;
                var logoCenterY = logoRect.top - heroRect.top + logoRect.height / 2;
                var logoDx = body.position.x - logoCenterX;
                var logoDy = body.position.y - logoCenterY;
                var logoRangeX = logoRect.width * 0.62;
                var logoRangeY = logoRect.height * 0.72;
                var driftingCenterX = orbit.cx + Math.sin(time * orbit.driftSpeed + orbit.driftPhase) * orbit.rx * 0.55;
                var driftingCenterY = orbit.cy + Math.cos(time * (orbit.driftSpeed * 0.83) + orbit.driftPhase) * orbit.ry * 0.55;
                var orbitX = driftingCenterX + Math.cos(time * orbit.speed + orbit.phase) * orbit.rx;
                var orbitY = driftingCenterY + Math.sin(time * (orbit.speed * 1.23) + orbit.phase) * orbit.ry;
                var orbitDx = orbitX - body.position.x;
                var orbitDy = orbitY - body.position.y;

                Body.applyForce(body, body.position, {
                  x: (Math.sin(time * (1.2 + orbit.driftSpeed) + orbit.phase) + orbit.driftX) * orbit.force,
                  y: (Math.cos(time * (1.05 + orbit.driftSpeed) + orbit.driftPhase) + orbit.driftY) * orbit.force
                });
                Body.applyForce(body, body.position, {
                  x: orbitDx * 0.00000125,
                  y: orbitDy * 0.00000125
                });

                if (Math.abs(logoDx) < logoRangeX && Math.abs(logoDy) < logoRangeY) {
                  var escapeDistance = Math.max(Math.sqrt(logoDx * logoDx + logoDy * logoDy), 1);
                  Body.applyForce(body, body.position, {
                    x: (logoDx / escapeDistance) * 0.0022,
                    y: (logoDy / escapeDistance) * 0.0022
                  });
                }

                if (pointer.active) {
                  var dx = body.position.x - pointer.x;
                  var dy = body.position.y - pointer.y;
                  var distanceSq = dx * dx + dy * dy;
                  var radius = 280;
                  if (distanceSq < radius * radius && distanceSq > 1) {
                    var distance = Math.sqrt(distanceSq);
                    var strength = (1 - distance / radius) * 0.0042;
                    var swirl = strength * 0.42;
                    Body.applyForce(body, body.position, {
                      x: (dx / distance) * strength + (-dy / distance) * swirl,
                      y: (dy / distance) * strength + (dx / distance) * swirl
                    });
                    Body.setAngularVelocity(body, body.angularVelocity + (dx > 0 ? 0.0035 : -0.0035));

                    if (distance < body.stickerSize * 0.52 && time - body.lastHit > 0.45) {
                      var hitStrength = 0.045;
                      Body.applyForce(body, body.position, {
                        x: (dx / distance) * hitStrength,
                        y: (dy / distance) * hitStrength
                      });
                      Body.setAngularVelocity(body, body.angularVelocity + (dx > 0 ? 0.08 : -0.08));
                      body.lastHit = time;
                    }
                  }
                }

                var speed = Math.sqrt(body.velocity.x * body.velocity.x + body.velocity.y * body.velocity.y);
                if (speed > 9) {
                  Body.setVelocity(body, {
                    x: body.velocity.x * 0.94,
                    y: body.velocity.y * 0.94
                  });
                }
              });
            }

            function drawStickers() {
              var rect = hero.getBoundingClientRect();
              ctx.clearRect(0, 0, rect.width, rect.height);
              if (!visible) return;
              bodies.forEach(function (body) {
                var img = images[body.stickerIndex];
                if (!img || !img.complete) return;
                ctx.save();
                ctx.translate(body.position.x, body.position.y);
                ctx.rotate(body.angle);
                ctx.globalAlpha = 0.82;
                ctx.drawImage(img, -body.stickerSize / 2, -body.stickerSize / 2, body.stickerSize, body.stickerSize);
                ctx.restore();
              });
            }

            function showStickers() {
              var wasVisible = visible;
              visible = true;
              rebuildLogoBodies();
              hero.classList.add("stickers-visible");
              if (wasVisible) return;
              bodies.forEach(function (body, index) {
                Body.applyForce(body, body.position, {
                  x: Math.sin(index * 1.9 + Date.now() * 0.001) * 0.006,
                  y: Math.cos(index * 1.4 + Date.now() * 0.001) * 0.006
                });
              });
            }

            function hideStickers() {
              visible = true;
              hero.classList.add("stickers-visible");
            }

            createStickers();
            resizeCanvas();
            Runner.run(runner, engine);
            showStickers();

            Events.on(engine, "beforeUpdate", gentlyFloat);
            (function renderStickers() {
              requestAnimationFrame(renderStickers);
              drawStickers();
            })();

            hero.addEventListener("pointermove", function (event) {
              var rect = hero.getBoundingClientRect();
              pointer.x = event.clientX - rect.left;
              pointer.y = event.clientY - rect.top;
              pointer.active = true;
              showStickers();
            });
            hero.addEventListener("pointerleave", function () {
              pointer.active = false;
            });
            hero.addEventListener("pointerenter", showStickers);
            logo.addEventListener("pointerenter", showStickers);
            logo.addEventListener("focusin", showStickers);
            window.addEventListener("resize", resizeCanvas);
          }
        });
      })();
    </script>

    <!-- Catalog -->
    <script>
      (function () {
        document.addEventListener("DOMContentLoaded", function () {
          var section = document.getElementById("catalog-scroll");
          var cards = Array.prototype.slice.call(document.querySelectorAll(".catalog-card"));
          var ticking = false;
          var verticalImages = [
            "assets/catalogo/A4_dogs.png",
            "assets/catalogo/A4-digitaldoggies.png",
            "assets/catalogo/03.jpg",
            "assets/catalogo/04.jpg",
            "assets/catalogo/05.jpg",
            "assets/catalogo/06.png",
            "assets/catalogo/07.png",
            "assets/catalogo/08.jpg",
            "assets/catalogo/09.jpg",
            "assets/catalogo/15.jpg",
            "assets/catalogo/16.jpg",
            "assets/catalogo/17.jpg"
          ];

          if (!section || cards.length === 0) return;

          function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
          }

          function shuffle(items) {
            var shuffled = items.slice();
            for (var i = shuffled.length - 1; i > 0; i--) {
              var j = Math.floor(Math.random() * (i + 1));
              var temp = shuffled[i];
              shuffled[i] = shuffled[j];
              shuffled[j] = temp;
            }
            return shuffled;
          }

          function fillCatalogImages() {
            var selected = shuffle(verticalImages);
            cards.forEach(function (card, index) {
              var img = card.querySelector("img");
              var src = selected[index % selected.length];
              var name = src.split("/").pop().replace(/\.[^.]+$/, "").replace(/[-_]/g, " ");
              if (!img) return;
              img.src = src;
              img.alt = "Ilustracion Rafita Studio " + name;
            });
          }

          function updateCatalog() {
            var rect = section.getBoundingClientRect();
            var travel = section.offsetHeight - window.innerHeight;
            var progress = travel > 0 ? clamp(-rect.top / travel, 0, 1) : 1;
            var isMobile = window.matchMedia("(max-width: 720px)").matches;

            cards.forEach(function (card, index) {
              var start = isMobile ? (index < 4 ? 0 : 0.38) : index / (cards.length + 1);
              if (progress >= start) {
                card.classList.add("visible");
              } else {
                card.classList.remove("visible");
              }
            });

            ticking = false;
          }

          function requestUpdate() {
            if (!ticking) {
              ticking = true;
              requestAnimationFrame(updateCatalog);
            }
          }

          fillCatalogImages();
          updateCatalog();
          window.addEventListener("scroll", requestUpdate, { passive: true });
          window.addEventListener("resize", requestUpdate);
        });
      })();
    </script>

    <!-- Type Poster -->
    <script>
      (function () {
        document.addEventListener("DOMContentLoaded", function () {
          var poster = document.getElementById("type-poster");
          var lines = Array.prototype.slice.call(document.querySelectorAll("[data-scramble]"));
          var glyphs = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789*+/#@!?%&<>☻✱";
          var palette = ["#ff9418","#66b6e9","#099947","#f193c9","#ff3122","#ffc21a","#0d73c8","#5833a3"];
          var active = false;
          var timers = [];

          if (!poster || lines.length === 0) return;

          poster.addEventListener("pointerover", function (event) {
            if (event.target.classList.contains("hover-letter")) {
              event.target.style.setProperty("--hover-color", palette[Math.floor(Math.random() * palette.length)]);
            }
          });

          function clearTimers() {
            timers.forEach(function (timer) {
              if (timer.type === "timeout") clearTimeout(timer.id);
              if (timer.type === "interval") clearInterval(timer.id);
            });
            timers = [];
          }

          function setLineText(line, text) {
            line.textContent = "";
            for (var i = 0; i < text.length; i++) {
              if (text[i] === " ") {
                line.appendChild(document.createTextNode(" "));
              } else {
                var letter = document.createElement("span");
                letter.className = "hover-letter";
                letter.style.setProperty("--hover-color", palette[Math.floor(Math.random() * palette.length)]);
                letter.textContent = text[i];
                line.appendChild(letter);
              }
            }
          }

          function randomizeText(text) {
            var output = "";
            for (var i = 0; i < text.length; i++) {
              output += text[i] === " " ? " " : glyphs[Math.floor(Math.random() * glyphs.length)];
            }
            return output;
          }

          function scrambleLine(line, delay) {
            var target = line.getAttribute("data-scramble") || "";
            var frame = 0;
            var maxFrames = target.length + 16;

            var timeout = setTimeout(function () {
              var timer = setInterval(function () {
                var output = "";

                for (var i = 0; i < target.length; i++) {
                  if (target[i] === " ") {
                    output += " ";
                  } else if (frame > i + 8) {
                    output += target[i];
                  } else {
                    output += glyphs[Math.floor(Math.random() * glyphs.length)];
                  }
                }

                setLineText(line, output);
                frame++;

                if (frame > maxFrames) {
                  setLineText(line, target);
                  clearInterval(timer);
                }
              }, 34);
              timers.push({ id: timer, type: "interval" });
            }, delay);
            timers.push({ id: timeout, type: "timeout" });
          }

          function startPoster() {
            if (active) return;
            active = true;
            clearTimers();
            poster.classList.add("poster-visible");
            lines.forEach(function (line, index) {
              scrambleLine(line, index * 170);
            });
          }

          function resetPoster() {
            if (!active) return;
            active = false;
            clearTimers();
            poster.classList.remove("poster-visible");
            lines.forEach(function (line) {
              setLineText(line, randomizeText(line.getAttribute("data-scramble") || ""));
            });
          }

          resetPoster();
          lines.forEach(function (line) {
            setLineText(line, randomizeText(line.getAttribute("data-scramble") || ""));
          });

          if (!("IntersectionObserver" in window)) {
            startPoster();
            return;
          }

          var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                startPoster();
              } else {
                resetPoster();
              }
            });
          }, { threshold: 0.35 });

          observer.observe(poster);
        });
      })();
    </script>

    <!-- Footer -->
    <script>
      (function () {
        document.addEventListener("DOMContentLoaded", function () {
          var footer = document.getElementById("site-footer");
          if (!footer) return;

          if (!("IntersectionObserver" in window)) {
            footer.classList.add("footer-visible");
            return;
          }

          var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                footer.classList.add("footer-visible");
                observer.unobserve(footer);
              }
            });
          }, { threshold: 0.35 });

          observer.observe(footer);
        });
      })();
    </script>
