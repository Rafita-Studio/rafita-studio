<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ilustraciones — Rafita Studio</title>
    <link rel="stylesheet" href="https://use.typekit.net/iic6jga.css" />
    <link rel="stylesheet" href="../styles/style.css" />
    <style>
      :root {
        --paper: #ecebe6;
        --ink: #363636;
        --orange: #ff9418;
        --blue: #0d73c8;
        --green: #099947;
        --pink: #f193c9;
        --red: #ff3122;
        --yellow: #ffc21a;
        --violet: #5833a3;
      }

      html,
      body {
        min-height: 100%;
      }

      body.catalog-page {
        background: var(--paper);
        color: var(--ink);
        font-family: "liebling", sans-serif;
        overflow-x: hidden;
      }

      .catalog-main {
        background: var(--paper);
      }

      .catalog-home {
        display: inline-grid;
        place-items: center;
        width: 44px;
        height: 44px;
        margin: clamp(22px, 3vw, 42px) clamp(18px, 5vw, 82px) 0;
        color: var(--ink);
        text-decoration: none;
        transition:
          color 180ms ease,
          transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .catalog-home svg {
        display: block;
        width: 34px;
        height: 34px;
        fill: currentColor;
      }

      .catalog-home:hover {
        color: var(--link-hover-color, var(--orange));
        transform: rotate(var(--link-hover-rotate, -2deg));
      }

      .catalog-gallery {
        width: min(1320px, calc(100% - clamp(36px, 8vw, 132px)));
        margin: 0 auto;
        padding: clamp(28px, 4vw, 58px) 0 clamp(58px, 7vw, 108px);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(clamp(150px, 18vw, 260px), 1fr));
        column-gap: clamp(4px, 2vw, 34px);
        row-gap: clamp(2px, 2vw, 42px);
        align-items: center;
        overflow: visible;
      }

      .catalog-card {
        --item-x: 0px;
        --item-y: 0px;
        --item-rotate: 0deg;
        --item-scale: 1;
        --reveal-y: 42px;
        display: grid;
        place-items: center;
        width: 100%;
        min-height: clamp(132px, 20vw, 310px);
        margin: 0;
        opacity: 0;
        position: relative;
        z-index: var(--item-z, 1);
        transform:
          translate3d(var(--item-x), calc(var(--item-y) + var(--reveal-y)), 0)
          rotate(var(--item-rotate))
          scale(var(--item-scale));
        transition:
          opacity 620ms ease,
          transform 760ms cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform;
      }

      .catalog-card.is-visible {
        --reveal-y: 0px;
        opacity: 1;
      }

      .catalog-card img {
        display: block;
        width: min(100%, var(--item-width, 100%));
        height: auto;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        transition:
          filter 180ms ease,
          transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .catalog-card:hover img {
        filter: drop-shadow(0 16px 18px rgba(45, 38, 42, 0.16));
        transform: rotate(var(--link-hover-rotate, -1deg)) translateY(-3px);
      }

      .catalog-card.is-hovered {
        z-index: 30;
      }

      .catalog-page footer {
        background: #f7f1f8;
        border-top: 0;
        color: #5d4c63;
        padding: 28px 24px;
        font-family: "liebling", sans-serif;
        font-size: 14px;
      }

      @media (max-width: 720px) {
        .catalog-home {
          margin: 20px 18px 0;
        }

        .catalog-gallery {
          width: calc(100% - 36px);
        }

        .catalog-gallery {
          padding-top: 30px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          column-gap: 8px;
          row-gap: 10px;
        }

        .catalog-card {
          grid-column: auto !important;
          min-height: 150px;
        }
      }
    </style>
  </head>

          <path fill-rule="evenodd" clip-rule="evenodd" d="M6.8 16.15 16 8.1l9.2 8.05V27a1.4 1.4 0 0 1-1.4 1.4h-6.25v-5.9a3.55 3.55 0 0 0-7.1 0v5.9H8.2A1.4 1.4 0 0 1 6.8 27V16.15Z" />

    <script>
      (function () {
        document.addEventListener("DOMContentLoaded", function () {
          var items = Array.prototype.slice.call(document.querySelectorAll(".catalog-home, .catalog-card"));
          var cards = Array.prototype.slice.call(document.querySelectorAll(".catalog-card"));
          var gallery = document.querySelector(".catalog-gallery");
          var palette = ["#ff9418","#66b6e9","#099947","#f193c9","#ff3122","#ffc21a","#0d73c8","#5833a3"];

          function randomHover(item) {
            var color = palette[Math.floor(Math.random() * palette.length)];
            var rotate = (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random() * 1.8);
            item.style.setProperty("--link-hover-color", color);
            item.style.setProperty("--link-hover-rotate", rotate.toFixed(2) + "deg");
          }

          items.forEach(function (item) {
            randomHover(item);
            item.addEventListener("mouseenter", function () {
              randomHover(item);
              if (item.classList.contains("catalog-card")) {
                item.classList.add("is-hovered");
              }
            });
            item.addEventListener("mouseleave", function () {
              item.classList.remove("is-hovered");
            });
            item.addEventListener("focus", function () {
              randomHover(item);
              if (item.classList.contains("catalog-card")) {
                item.classList.add("is-hovered");
              }
            });
            item.addEventListener("blur", function () {
              item.classList.remove("is-hovered");
            });
          });

          for (var i = cards.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var temp = cards[i];
            cards[i] = cards[j];
            cards[j] = temp;
          }

          if (gallery) {
            cards.forEach(function (card) {
              gallery.appendChild(card);
            });
          }

          cards.forEach(function (card, index) {
            var isFeature = index % 7 === 0 || Math.random() < 0.18;
            var x = ((Math.random() * 2 - 1) * (isFeature ? 82 : 54)).toFixed(2);
            var y = ((Math.random() * 2 - 1) * (isFeature ? 76 : 46)).toFixed(2);
            var rotate = ((Math.random() * 2 - 1) * (isFeature ? 15 : 11)).toFixed(2);
            var scale = (isFeature ? 1.02 + Math.random() * 0.2 : 0.88 + Math.random() * 0.26).toFixed(3);
            var width = (isFeature ? 94 + Math.random() * 24 : 84 + Math.random() * 24).toFixed(2);
            var z = Math.floor(1 + Math.random() * 8);

            card.style.setProperty("--item-x", x + "px");
            card.style.setProperty("--item-y", y + "px");
            card.style.setProperty("--item-rotate", rotate + "deg");
            card.style.setProperty("--item-scale", scale);
            card.style.setProperty("--item-width", width + "%");
            card.style.setProperty("--item-z", z);
            card.style.gridColumn = isFeature ? "span 2" : "span 1";
            card.style.transitionDelay = (index % 5 * 70) + "ms";
          });

          if ("IntersectionObserver" in window) {
            var revealObserver = new IntersectionObserver(function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  entry.target.classList.add("is-visible");
                  revealObserver.unobserve(entry.target);
                }
              });
            }, { rootMargin: "0px 0px -8% 0px", threshold: 0.18 });

            cards.forEach(function (card) {
              revealObserver.observe(card);
            });
          } else {
            cards.forEach(function (card) {
              card.classList.add("is-visible");
            });
          }
        });
      })();
    </script>

    <script>
      document.addEventListener("contextmenu", function (event) {
        if (event.target.tagName === "IMG") {
          event.preventDefault();
        }
      });

      document.addEventListener("dragstart", function (event) {
        if (event.target.tagName === "IMG") {
          event.preventDefault();
        }
      });
    </script>
