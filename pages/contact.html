<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacto — Rafita Studio</title>
    <link rel="stylesheet" href="https://use.typekit.net/iic6jga.css" />
    <link rel="stylesheet" href="../styles/style.css" />
    <style>
      :root {
        --paper: #ecebe6;
        --ink: #363636;
        --orange: #ff9418;
        --blue: #0d73c8;
        --green: #099947;
        --pink: #f193c9;
        --red: #ff3122;
        --yellow: #ffc21a;
        --violet: #5833a3;
      }

      html,
      body {
        min-height: 100%;
      }

      body.contact-page {
        background: var(--paper);
        color: var(--ink);
        font-family: "liebling", sans-serif;
        overflow-x: hidden;
      }

      .contact-main {
        background: var(--paper);
      }

      .contact-home {
        display: inline-grid;
        place-items: center;
        width: 44px;
        height: 44px;
        margin: clamp(22px, 3vw, 42px) clamp(18px, 5vw, 82px) 0;
        color: var(--ink);
        text-decoration: none;
        transition:
          color 180ms ease,
          transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .contact-home svg {
        display: block;
        width: 34px;
        height: 34px;
        fill: currentColor;
      }

      .contact-home:hover {
        color: var(--link-hover-color, var(--orange));
        transform: rotate(var(--link-hover-rotate, -2deg));
      }

      .contact-hero {
        width: min(1320px, calc(100% - clamp(36px, 8vw, 132px)));
        margin: 0 auto;
        padding: clamp(48px, 8vw, 104px) 0 clamp(54px, 8vw, 112px);
        display: grid;
        grid-template-columns: minmax(0, 0.96fr) minmax(300px, 0.78fr);
        gap: clamp(34px, 7vw, 92px);
        align-items: start;
      }

      .contact-title {
        --title-x: 0px;
        --title-y: 0px;
        --title-rotate: 0deg;
        margin: 0;
        max-width: 860px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 400;
        font-size: clamp(42px, 6.8vw, 96px);
        line-height: 0.88;
        letter-spacing: 0;
        white-space: nowrap;
        text-transform: uppercase;
        color: var(--pink);
        transform: translate3d(var(--title-x), var(--title-y), 0) rotate(var(--title-rotate));
        transition: transform 360ms cubic-bezier(0.16, 1, 0.3, 1);
        animation: title-palette 8s steps(8, end) infinite;
        will-change: transform;
      }

      .contact-intro {
        max-width: 780px;
        margin: clamp(24px, 3.2vw, 42px) 0 0;
        font-size: clamp(19px, 2vw, 28px);
        line-height: 1.12;
      }

      .contact-direct {
        margin-top: clamp(22px, 3vw, 38px);
        font-size: clamp(18px, 1.6vw, 24px);
        line-height: 1.12;
      }

      .contact-direct a {
        display: inline-block;
        color: inherit;
        text-decoration: underline;
        text-decoration-thickness: 0.06em;
        text-underline-offset: 0.14em;
        transition:
          color 180ms ease,
          transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .contact-direct a:hover {
        color: var(--link-hover-color, var(--orange));
        transform: rotate(var(--link-hover-rotate, -2deg));
      }

      @keyframes title-palette {
        0% { color: var(--pink); }
        12.5% { color: var(--orange); }
        25% { color: #66b6e9; }
        37.5% { color: var(--green); }
        50% { color: var(--red); }
        62.5% { color: var(--yellow); }
        75% { color: var(--blue); }
        87.5% { color: var(--violet); }
        100% { color: var(--pink); }
      }

      .contact-form {
        width: 100%;
        max-width: 560px;
        margin: 4px 0 0 auto;
        display: grid;
        gap: 14px;
        padding-top: clamp(8px, 1.6vw, 24px);
        border-top: 2px solid rgba(54, 54, 54, 0.42);
      }

      .contact-form label {
        margin-top: 8px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 13px;
        text-transform: uppercase;
      }

      .contact-form input,
      .contact-form textarea {
        width: 100%;
        border: 2px solid rgba(54, 54, 54, 0.72);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.36);
        color: var(--ink);
        font-family: "liebling", sans-serif;
        font-size: clamp(18px, 1.8vw, 26px);
        line-height: 1.05;
        padding: 15px 16px 17px;
        outline: none;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease;
      }

      .contact-form textarea {
        min-height: 170px;
        resize: vertical;
      }

      .contact-form input:focus,
      .contact-form textarea:focus {
        border-color: var(--orange);
        background: rgba(255, 255, 255, 0.58);
        box-shadow: 0 0 0 4px rgba(255, 148, 24, 0.14);
      }

      .contact-form button {
        justify-self: start;
        margin-top: 12px;
        min-height: 48px;
        padding: 12px 22px 13px;
        border: 2px solid var(--ink);
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 15px;
        text-transform: uppercase;
        transition:
          color 180ms ease,
          background 180ms ease,
          border-color 180ms ease,
          transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .contact-form button:hover {
        color: var(--paper);
        background: var(--link-hover-color, var(--orange));
        border-color: var(--link-hover-color, var(--orange));
        transform: rotate(var(--link-hover-rotate, -2deg));
      }

      #form-status {
        min-height: 1.2em;
        margin: 2px 0 0;
        font-size: 16px;
        line-height: 1.2;
      }

      .contact-page footer {
        background: #f7f1f8;
        border-top: 0;
        color: #5d4c63;
        padding: 28px 24px;
        font-family: "liebling", sans-serif;
        font-size: 14px;
      }

      @media (max-width: 920px) {
        .contact-hero {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .contact-form {
          max-width: 760px;
          margin-left: 0;
        }
      }

      @media (max-width: 720px) {
        .contact-home {
          margin: 20px 18px 0;
        }

        .contact-hero {
          width: calc(100% - 36px);
          padding: 42px 0 58px;
          gap: 38px;
        }

        .contact-title {
          font-size: clamp(42px, 12vw, 68px);
        }

        .contact-intro {
          font-size: clamp(19px, 5.5vw, 26px);
        }
      }
    </style>
  </head>

  <body class="contact-page">
    <main class="contact-main">
      <a class="contact-home" href="../index.html" aria-label="Volver al inicio">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path d="M15.18 4.16a1.25 1.25 0 0 1 1.64 0l12.55 10.96a1.28 1.28 0 0 1 .12 1.8l-.82.94a1.28 1.28 0 0 1-1.8.12L16 8.49 5.13 17.98a1.28 1.28 0 0 1-1.8-.12l-.82-.94a1.28 1.28 0 0 1 .12-1.8L15.18 4.16Z" />
          <path fill-rule="evenodd" clip-rule="evenodd" d="M6.8 16.15 16 8.1l9.2 8.05V27a1.4 1.4 0 0 1-1.4 1.4h-6.25v-5.9a3.55 3.55 0 0 0-7.1 0v5.9H8.2A1.4 1.4 0 0 1 6.8 27V16.15Z" />
          <path d="M22.5 6.6a1.25 1.25 0 0 1 1.25-1.25h2.15a1.25 1.25 0 0 1 1.25 1.25v7.86L22.5 10.4V6.6Z" />
        </svg>
      </a>

      <section class="contact-hero" aria-labelledby="contact-title">
        <div class="contact-copy">
          <h1 class="contact-title" id="contact-title">contacto :)</h1>
          <p class="contact-intro">
            ¿Tienes un perrito especial, un encargo o una idea dando vueltas?<br />
            Escríbenos y conversemos con calma.
          </p>
          <p class="contact-direct">
            También puedes escribir directo a
            <a href="mailto:rafita.estudio@gmail.com">rafita.estudio@gmail.com</a>
          </p>
        </div>

        <form id="contact-form" class="contact-form">
          <label for="email">tu correo</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="tucorreo@dominio.com"
          />

          <label for="subject">asunto</label>
          <input type="text" id="subject" name="subject" required />

          <label for="message">mensaje</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <input type="text" name="_hp" style="display:none" tabindex="-1" autocomplete="off" />

          <button type="submit">enviar</button>
          <p id="form-status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer>
      <p>rafita studio © 2026 hecho con amor, sobretodo amor a los perritos &lt;3</p>
    </footer>

    <script>
      (function () {
        document.addEventListener("DOMContentLoaded", function () {
          var items = Array.prototype.slice.call(document.querySelectorAll(".contact-home, .contact-form button, .contact-direct a"));
          var title = document.querySelector(".contact-title");
          var palette = ["#ff9418","#66b6e9","#099947","#f193c9","#ff3122","#ffc21a","#0d73c8","#5833a3"];

          function randomHover(item) {
            var color = palette[Math.floor(Math.random() * palette.length)];
            var rotate = (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 2.4);
            item.style.setProperty("--link-hover-color", color);
            item.style.setProperty("--link-hover-rotate", rotate.toFixed(2) + "deg");
          }

          items.forEach(function (item) {
            randomHover(item);
            item.addEventListener("mouseenter", function () {
              randomHover(item);
            });
            item.addEventListener("focus", function () {
              randomHover(item);
            });
          });

          if (!title) return;

          window.addEventListener("mousemove", function (event) {
            var x = (event.clientX / window.innerWidth - 0.5) * 2;
            var y = (event.clientY / window.innerHeight - 0.5) * 2;

            title.style.setProperty("--title-x", (x * 14).toFixed(2) + "px");
            title.style.setProperty("--title-y", (y * 10).toFixed(2) + "px");
            title.style.setProperty("--title-rotate", (x * 1.8).toFixed(2) + "deg");
          });

          window.addEventListener("mouseleave", function () {
            title.style.setProperty("--title-x", "0px");
            title.style.setProperty("--title-y", "0px");
            title.style.setProperty("--title-rotate", "0deg");
          });
        });
      })();
    </script>

    <script>
      const APP_URL = "https://script.google.com/macros/s/AKfycbwdkG6HR9JTUESjck6bsP_rl3kDND_m-TipNnZq02w22-kvaOc3arji4B4Jd25Tcm_ruw/exec";

      document.getElementById("contact-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const f = e.target;
        const status = document.getElementById("form-status");

        if (f._hp && f._hp.value) return;

        if (!f.email.checkValidity()) {
          status.textContent = "Ingresa un correo válido.";
          return;
        }

        const fd = new FormData();
        fd.append("email", f.email.value.trim());
        fd.append("subject", f.subject.value.trim());
        fd.append("message", f.message.value.trim());

        try {
          await fetch(APP_URL, { method: "POST", mode: "no-cors", body: fd });
          status.textContent = "Mensaje enviado. Gracias por escribirnos :)";
          f.reset();
        } catch (err) {
          status.textContent = "No pudimos enviar el mensaje. Intenta más tarde.";
          console.error(err);
        }
      });
    </script>
    <script src="../scripts/page-fade.js"></script>
  </body>
</html>
